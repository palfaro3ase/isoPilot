<div class="animate__animated animate__fadeIn" id="vista-agente">
  <div class="d-flex align-items-center mb-4">
    <i class="bi bi-robot fs-2 me-3 text-primary"></i>
    <h2 class="mb-0">Agente Auditor de Calidad</h2>
  </div>

  <div class="card shadow-sm border-0 p-4">
    <h5 class="card-title text-secondary">Analizar Documentación de Auditoría</h5>
    <p class="text-muted">Seleccione los archivos para el análisis de cumplimiento e historial.</p>
    
    <div class="mt-4">
      <div class="input-group mb-2">
        <input type="file" class="form-control" id="fileInput" multiple accept=".pdf,.docx,.doc">
        <button class="btn btn-primary px-5 shadow-sm" type="button" id="btnAnalizar">
          <i class="bi bi-search me-2"></i> Analizar
        </button>
      </div>
      <div class="d-flex align-items-center">
        <span class="badge bg-light text-danger border me-2">Solo permitido: PDF, DOCX y DOC</span>
      </div>
    </div>

    <div id="statusContainer" class="mt-4 d-none">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span id="statusText" class="fw-bold text-primary small">Validando archivos...</span>
        <span id="porcentajeText" class="small text-muted">0%</span>
      </div>
      <div class="progress" style="height: 8px; border-radius: 10px;">
        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%"></div>
      </div>
    </div>

    <div id="resultadosAuditoria" class="mt-4"></div>
  </div>
</div>
