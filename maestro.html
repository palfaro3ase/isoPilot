<div class="animate__animated animate__fadeIn">
  <!-- Cabecera -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="mb-0">📂 Listado Maestro</h2>
      <p class="text-muted small mb-0">Gestión de documentos oficiales del sistema</p>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-success btn-sm shadow-sm" onclick="window.abrirModalMaestro()">
        <i class="bi bi-plus-circle me-1"></i> Nuevo Documento
      </button>
      <button id="btnActualizarMaestro" class="btn btn-outline-primary btn-sm shadow-sm" onclick="window.cargarMaestro()">
        <i class="bi bi-arrow-clockwise me-1"></i> Actualizar
      </button>
    </div>
  </div>

  <!-- Barra de Búsqueda y Filtros -->
  <div class="card shadow-sm border-0 mb-3">
    <div class="card-body py-2">
      <div class="input-group input-group-sm">
        <span class="input-group-text bg-white border-end-0 text-muted">
          <i class="bi bi-search"></i>
        </span>
        <input type="text" id="buscarMaestro" class="form-control border-start-0 ps-0" 
               placeholder="Buscar por código o nombre de documento..." onkeyup="filtrarMaestro()">
      </div>
    </div>
  </div>

  <!-- Estados -->
  <div id="sinMaestro">
    <div class="alert alert-light border shadow-sm text-center py-5">
      <div id="msgStatusMaestro" class="text-muted fs-5">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        Sincronizando registros...
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div id="tablaMaestro" style="display:none;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="tablaDatosMaestro">
            <thead class="table-light">
              <tr>
                <th style="width: 20%;">Código</th>
                <th style="width: 45%;">Nombre del Documento</th>
                <th style="width: 15%; text-align: center;">Versión</th>
                <th style="width: 20%; text-align: right;" class="pe-3">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyMaestro"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="mt-2 px-2">
      <small class="text-muted" id="contadorMaestro"></small>
    </div>
  </div>
</div>

<!-- Modal Nuevo Registro Maestro -->
<div class="modal fade" id="modalNuevoDoc" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content shadow-lg border-0">
      <div class="modal-header bg-success text-white py-3">
        <h5 class="modal-title fs-6 fw-bold">
          <i class="bi bi-file-earmark-medical me-2"></i>Nuevo Registro Maestro
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="formNuevoMaestro">
          <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Código del Documento</label>
            <input type="text" id="docCodigo" placeholder="Ej: PR-SGC-001" class="form-control form-control-sm shadow-sm">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Nombre del Documento</label>
            <input type="text" id="docNombre" placeholder="Nombre descriptivo del documento" class="form-control form-control-sm shadow-sm">
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label small fw-bold text-secondary">Versión Inicial</label>
              <input type="text" id="docVersion" value="1.0" class="form-control form-control-sm shadow-sm text-center">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Adjuntar Archivo (PDF, DOC, DOCX)</label>
            <input type="file" id="docFile" class="form-control form-control-sm shadow-sm" accept=".pdf,.doc,.docx">
            <div class="form-text x-small text-info">
              <i class="bi bi-info-circle me-1"></i>Se guardará en 02_DOCUMENTOS_VIGENTES.
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light py-2">
        <button type="button" class="btn btn-secondary btn-sm px-3" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnGuardarMaestro" class="btn btn-success btn-sm px-4 shadow-sm" onclick="window.guardarMaestro()">
          <i class="bi bi-cloud-arrow-up me-1"></i> Guardar Registro
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  // Función para filtrar la tabla en tiempo real
  function filtrarMaestro() {
    const input = document.getElementById("buscarMaestro");
    const filter = input.value.toLowerCase();
    const table = document.getElementById("tablaDatosMaestro");
    const tr = table.getElementsByTagName("tr");
    let visibles = 0;

    for (let i = 1; i < tr.length; i++) {
      const tdCodigo = tr[i].getElementsByTagName("td")[0];
      const tdNombre = tr[i].getElementsByTagName("td")[1];
      if (tdCodigo || tdNombre) {
        const txtValue = (tdCodigo.textContent || tdNombre.textContent).toLowerCase();
        if (txtValue.indexOf(filter) > -1) {
          tr[i].style.display = "";
          visibles++;
        } else {
          tr[i].style.display = "none";
        }
      }
    }
    document.getElementById("contadorMaestro").innerText = `Mostrando ${visibles} registros`;
  }
</script>

<!-- Disparador automático -->
<img src="x" onerror="window.cargarMaestro()" style="display:none;">
